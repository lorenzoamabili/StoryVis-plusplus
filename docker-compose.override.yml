version: '3'

services:
  frontend:
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/frontend
    # since this folder is mounted, run yarn again to make sure node_modules are installed 
    command: ["yarn && ./watch.sh"]

  mongo:
    ports:
      - "27017:27017"

  backend:
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/backend
    # since this folder is mounted, run yarn again to make sure node_modules are installed 
    command: ["yarn && yarn start-dev"]

networks:
  main:

