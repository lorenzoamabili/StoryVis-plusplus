<div id="main" class="visualizer">
    <div id="r0" class="renderer">
        <button *ngIf="!settings.isOneView" mat-icon-button class="magnification" (click)="displayOneView('r0');"
            matTooltip="Magnify view">
            <mat-icon>fullscreen</mat-icon>
        </button>
        <button *ngIf="settings.isOneView" mat-icon-button class="magnification-exit" (click)="displayOneView('r0');"
            matTooltip="Reduce view">
            <mat-icon>fullscreen_exit</mat-icon>
        </button>
        <button mat-icon-button class="sliceIndex"
            matTooltip="Scroll the mouse wheel to navigate through slices.">
            Slice {{ getIndex(_axialRenderer) }}
        </button>
        <div *ngIf="settings.isAdvancedMode">
            <button mat-icon-button class="datacomics" (click)="addFrame('datacomics', 'r0');"
                matTooltip="Capture this panel as a data-comics frame (Alt+click also works)">
                <mat-icon>grid_on</mat-icon>
            </button>
            <button *ngIf="settings.isOneView" mat-icon-button class="navigation-up"
                (click)="navigateVolume('axial', this._axialRenderer.stackHelper._orientationMaxIndex -1, 10000);"
                matTooltip="Navigate toward superior (head) slices">
                <mat-icon>keyboard_arrow_up</mat-icon>
            </button>
            <button *ngIf="settings.isOneView" mat-icon-button class="navigation-down"
                (click)="navigateVolume('axial', 1, 10000);" matTooltip="Navigate toward inferior (feet) slices">
                <mat-icon>keyboard_arrow_down</mat-icon>
            </button>
            <button *ngIf="!settings.isOneView && !settings.isComparisonMode && !settings.multiplePlanesModeOn"
                mat-icon-button class="comparison" (click)="settings.canvas.multiplePlanes('r0');"
                matTooltip="Multiple plane mode — show adjacent slices alongside this view">
                <mat-icon>filter_none</mat-icon>
            </button>
            <button *ngIf="!settings.isOneView && !settings.isComparisonMode && settings.multiplePlanesModeOn"
                mat-icon-button class="comparisonChecked" (click)="settings.canvas.multiplePlanes('r0');"
                matTooltip="Multiple plane mode — click to deactivate">
                <mat-icon>filter_none</mat-icon>
            </button>
        </div>
        <span class="panel-label">Axial</span>
        <!-- Coverage heatmap: each segment = a band of slices; lit = visited -->
        <div class="coverage-wrap" *ngIf="_initialized && coverage.getMax('axial') > 1"
             matTooltip="Axial coverage — {{ coverage.getVisitedCount('axial') }}/{{ coverage.getMax('axial') }} slices visited ({{ coverage.getCoveragePercent('axial') }}%)&#10;Each bar = 1/20 of the volume. Lit = that band has been scrolled through.">
            <div class="cov-segs">
                <div *ngFor="let v of coverageSegs.axial; trackBy: trackByIdx"
                     class="cov-seg"
                     [class.cov-visited]="v"
                     [class.cov-high]="v && coverage.getCoveragePercent('axial') >= 70"
                     [class.cov-mid]="v && coverage.getCoveragePercent('axial') >= 40 && coverage.getCoveragePercent('axial') < 70"
                     [class.cov-low]="v && coverage.getCoveragePercent('axial') < 40"></div>
            </div>
            <div class="cov-label"
                 [class.cov-label-high]="coverage.getCoveragePercent('axial') >= 70"
                 [class.cov-label-mid]="coverage.getCoveragePercent('axial') >= 40 && coverage.getCoveragePercent('axial') < 70"
                 [class.cov-label-low]="coverage.getCoveragePercent('axial') < 40">
                {{ coverage.getCoveragePercent('axial') }}%
            </div>
        </div>
        <canvas *ngIf="settings.loupeMode && loupeVisible && _loupeSrcPanel === 'r0'"
                class="loupe-canvas" width="160" height="160"
                [style.left.px]="loupeX + 16" [style.top.px]="loupeY - 80"></canvas>
    </div>

    <div id="r22" class="rendererNone">
        <button mat-icon-button class="sliceIndex" matTooltip="Slice index">
            Slice {{ getIndex(_coronalRenderer1) }}

    </div>
