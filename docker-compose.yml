services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/try
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://${DOMAIN:-localhost}}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - API_URL=${API_URL:-https://${DOMAIN:-localhost}/api}
      - DEBUG=${DEBUG:-false}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@localhost}
    depends_on:
      - frontend
      - backend

  mongo-backup:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db:ro
      - ./backups:/backups
    environment:
      - MONGO_URI=mongodb://mongo:27017/try
    entrypoint: >
      /bin/sh -c "
        while true; do
          sleep 86400 &
          wait $$!;
          DATE=$$(date +%Y%m%d_%H%M%S);
          mongodump --uri=$$MONGO_URI --out=/backups/$$DATE;
          echo \"Backup completed: $$DATE\";
          find /backups -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +;
        done
      "
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
  caddy-logs:
